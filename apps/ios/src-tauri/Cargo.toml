[package]
name = "hubble"
version = "0.1.17"
edition = "2021"
license = "MIT"
description = "Hubble.md iOS app"

[build-dependencies]
tauri-build = { version = "2", features = ["ios"] }

[dependencies]
tauri = { version = "2", features = ["ios"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Tauri plugins for iOS file system and dialog access
tauri-plugin-fs = "2"
tauri-plugin-dialog = "2"
tauri-plugin-shell = "2"
