<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			:root {
				color: #1f2933;
				font-family:
					Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
					"Segoe UI", sans-serif;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				padding-block: 24px;
				padding-inline: 24px;
			}

			.file-index {
				background: #f8faf9;
				border: 1px solid #c7d7cb;
				border-radius: 8px;
				padding-block: 20px;
				padding-inline: 20px;
			}

			.header {
				align-items: center;
				display: flex;
				gap: 12px;
				justify-content: space-between;
				margin-block-end: 16px;
			}

			h1 {
				font-size: 24px;
				line-height: 1.2;
				margin: 0;
			}

			.controls {
				display: flex;
				gap: 8px;
			}

			button {
				background: white;
				border: 1px solid #a8bdad;
				border-radius: 8px;
				color: #1f2933;
				cursor: pointer;
				font: inherit;
				padding-block: 8px;
				padding-inline: 12px;
			}

			button[aria-pressed="true"] {
				background: #123c2d;
				border-color: #123c2d;
				color: white;
			}

			ul {
				display: grid;
				gap: 8px;
				list-style: none;
				margin: 0;
				padding: 0;
			}

			li {
				background: white;
				border: 1px solid #d7e3da;
				border-radius: 8px;
				display: grid;
				gap: 4px;
				padding-block: 12px;
				padding-inline: 14px;
			}

			.path {
				font-size: 15px;
				font-weight: 700;
			}

			.meta {
				color: #607067;
				font-size: 13px;
			}

			.status {
				color: #607067;
				margin: 0;
			}
		</style>
	</head>
	<body>
		<div
			class="file-index"
			x-data="{
				files: [],
				sort: 'recent',
				error: '',
				async init() {
					try {
						this.files = await hubble.files.list('**/*.md')
					} catch (error) {
						this.error = error.message
					}
				},
				get sortedFiles() {
					return [...this.files].sort((a, b) => {
						if (this.sort === 'name') {
							return a.path.toLowerCase().localeCompare(b.path.toLowerCase())
						}
						return b.modified_at - a.modified_at || a.path.localeCompare(b.path)
					})
				},
				date(timestamp) {
					return new Date(timestamp * 1000).toLocaleString()
				}
			}"
		>
			<div class="header">
				<h1>Workspace files</h1>
				<div class="controls" aria-label="Sort files">
					<button
						type="button"
						:aria-pressed="sort === 'recent'"
						@click="sort = 'recent'"
					>
						Recent
					</button>
					<button
						type="button"
						:aria-pressed="sort === 'name'"
						@click="sort = 'name'"
					>
						Name
					</button>
				</div>
			</div>

			<p class="status" x-show="!error && files.length === 0">Loading files...</p>
			<p class="status" x-show="error" x-text="error"></p>

			<ul x-show="!error && files.length > 0">
				<template x-for="file in sortedFiles" :key="file.path">
					<li>
						<span class="path" x-text="file.path"></span>
						<span
							class="meta"
							x-text="`${date(file.modified_at)} · ${file.size} bytes`"
						></span>
					</li>
				</template>
			</ul>
		</div>
	</body>
</html>
