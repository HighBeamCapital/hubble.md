# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "hubble.md"

[setup]
script = '''
set -eu

SOURCE_REPO="${HUBBLE_ENV_SOURCE_REPO:-/Users/benholmes/Projects/hubble.md}"
WORKTREE="${CODEX_WORKTREE_PATH:-$(git rev-parse --show-toplevel)}"

sync_remote_branches() {
  if ! git -C "$SOURCE_REPO" fetch origin --prune; then
    echo "warning: failed to fetch origin; skipping branch sync" >&2
    return
  fi

  git -C "$SOURCE_REPO" for-each-ref --format='%(refname)' refs/remotes/origin |
    while IFS= read -r remote_ref; do
      branch=${remote_ref#refs/remotes/origin/}

      if [ "$branch" = "HEAD" ] || git -C "$SOURCE_REPO" show-ref --verify --quiet "refs/heads/$branch"; then
        continue
      fi

      git -C "$SOURCE_REPO" branch --track "$branch" "origin/$branch"
    done
}

sync_remote_branches

cd "$WORKTREE"

find "$SOURCE_REPO" \
  -type d \( -name '.git' -o -name 'node_modules' \) -prune -o \
  -type f \( -name '.env' -o -name '.env.*' \) ! -name '.env.example' \
  -exec sh -c '
source_root=$1
worktree=$2
prefix="$source_root/"
shift 2

for source_file do
  rel=${source_file#"$prefix"}
  if [ "$rel" = "$source_file" ]; then
    continue
  fi

  dest="$worktree/$rel"
  if [ -e "$dest" ] || [ -L "$dest" ]; then
    continue
  fi

  mkdir -p "$(dirname "$dest")"
  cp "$source_file" "$dest"
done
' sh "$SOURCE_REPO" "$WORKTREE" {} +

pnpm install
'''
