name: Oz Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage_issue:
    if: contains(github.event.issue.labels.*.name, 'bug') || contains(github.event.issue.labels.*.name, 'enhancement')
    name: Triage bug and feature issues with Oz
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Construct Oz prompt
        id: prompt
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map((label) => label.name);
            const isBug = labels.includes('bug');
            const issueType = isBug ? 'bug report' : 'feature request';
            const templatePath = isBug
              ? '.github/ISSUE_TEMPLATE/bug_report.md'
              : '.github/ISSUE_TEMPLATE/feature_request.md';
            const description = (issue.body || 'No description provided.').trim();

            const prompt = `You are the Oz Agent for this repository, running inside GitHub Actions.
            A new ${issueType} has been filed and the repository is already checked out in your workspace.

            Issue metadata:
            - Number: #${issue.number}
            - Title: ${issue.title}
            - Labels: ${labels.join(', ') || 'none'}
            - URL: ${issue.html_url}

            Issue body:
            ${description}

            Repository context:
            - Read the relevant issue template from \`${templatePath}\`.
            - Read the pull request template from \`.github/pull_request_template.md\`.
            - Use \`pnpm\` for package-manager commands in this repository.

            Your job:
            1. Decide whether this issue is actionable enough to investigate right now by comparing it against the relevant issue template.
            2. For bug reports, require enough detail to understand the bug, reproduce it, and compare expected vs. actual behavior. Ask for environment details only when they matter.
            3. For feature requests, require a clear problem statement and enough concrete detail to define a reasonably scoped change. Do not ask for optional sections unless they are needed to proceed.
            4. If the issue is not actionable, post exactly one concise GitHub issue comment with \`gh issue comment ${issue.number} --body ...\` that lists only the missing details needed to investigate, then stop without making code changes or opening a PR.
            5. If the issue is actionable, investigate the codebase, make a reasonable scoped attempt to address it, and run the most relevant validation commands you can find.
            6. If you make code changes, create a branch, commit them, push the branch, and open a draft PR with \`gh pr create --draft\`.
            7. The draft PR must follow the structure of \`.github/pull_request_template.md\`, include \`Closes #${issue.number}\`, and mention the testing you performed.
            8. After opening the draft PR, leave a short issue comment with the PR URL.
            9. If you determine after investigation that no safe or useful code change is possible yet, leave a concise comment explaining the blocker and stop without opening a PR.

            Important constraints:
            - Keep issue comments concise and specific.
            - Do not ask for information that is already present in the issue.
            - Do not create a non-draft PR.
            - Do not output a raw diff in your final response.
            `;

            core.setOutput('prompt', prompt);

      - name: Run Oz agent
        id: agent
        uses: warpdotdev/oz-agent-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          name: Issue #${{ github.event.issue.number }} triage
          cwd: ${{ github.workspace }}
          prompt: ${{ steps.prompt.outputs.prompt }}
          profile: ${{ vars.WARP_AGENT_PROFILE || '' }}
          warp_api_key: ${{ secrets.WARP_API_KEY }}
